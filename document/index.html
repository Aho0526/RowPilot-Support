<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>課題論文添削</title>
  <meta name="description" content="課題論文の添削・レビューを効率化する支援ツール">
  <meta name="robots" content="noindex, nofollow">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Noto+Sans+JP:wght@400;500;600&display=swap"
    rel="stylesheet">

  <!-- Marked.js (Markdown パーサー) -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

  <link rel="stylesheet" href="css/app.css">
</head>

<body>
  <!-- ローディングオーバーレイ -->
  <div id="loading-overlay" class="loading-overlay">
    <div class="loading-spinner"></div>
    <p>読み込み中...</p>
  </div>

  <!-- ================================================================
       アプリヘッダー
  ================================================================ -->
  <header class="app-header">
    <div class="header-left">
      <a href="/" class="header-logo" aria-label="RowPilot ホームへ">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
          <polyline points="9 22 9 12 15 12 15 22" />
        </svg>
      </a>
      <span class="header-separator" aria-hidden="true">/</span>
      <h1 class="header-title">
        <span id="essay-title">課題論文</span>
        <span class="header-subtitle">添削支援</span>
      </h1>
    </div>

    <div class="header-center">
      <!-- モード切替 -->
      <div class="mode-toggle" role="group" aria-label="表示モード切替">
        <button id="btn-mode-student" class="mode-btn mode-btn--active" aria-pressed="true">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M12 2L2 7l10 5 10-5-10-5z" />
            <path d="M2 17l10 5 10-5" />
            <path d="M2 12l10 5 10-5" />
          </svg>
          生徒モード
        </button>
        <button id="btn-mode-teacher" class="mode-btn" aria-pressed="false">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 0 0-3-3.87" />
            <path d="M16 3.13a4 4 0 0 1 0 7.75" />
          </svg>
          先生モード
        </button>
      </div>
    </div>

    <div class="header-right">
      <div id="email-notification-setting" class="email-setting">
        <label id="email-setting-label" for="email-setting-input">通知先:</label>
        <input type="email" id="email-setting-input" placeholder="メールアドレスを入力">
      </div>
      <span id="role-badge" class="role-badge role-badge--student">生徒モード</span>
    </div>
  </header>

  <!-- ================================================================
       メインレイアウト（3カラム）
  ================================================================ -->
  <main class="app-main">

    <!-- ── 左パネル: エッセイ ──────────────────────────────────── -->
    <section class="panel panel-essay" aria-label="エッセイ">
      <div class="panel-header" style="justify-content: flex-start; gap: 15px;">
        <h2 class="panel-title" style="margin-right: auto;">エッセイ</h2>
        <div class="panel-tabs" style="display: flex; gap: 4px;">
          <button id="btn-panel-edit" class="panel-tab panel-tab--active">編集</button>
          <button id="btn-panel-diff" class="panel-tab">履歴・差分</button>
        </div>
        <div class="panel-meta" id="essay-meta-info">
          <span id="char-count" class="char-count">0 字</span>
          <span id="save-status" class="save-status status--saved">保存済み</span>
          <span id="last-request-time" class="last-request-time"
            style="font-size: 11px; color: var(--color-text-muted);"></span>
        </div>
      </div>
      <div class="panel-body panel-body--editor">
        <!-- 差分コントロールバー (履歴モードの時のみ表示) -->
        <div id="diff-controls-bar" class="diff-controls-bar" style="display: none;">
          <select id="diff-version-select" class="banner-select" style="max-width: 140px;"></select>
          <select id="diff-compare-select" class="banner-select">
            <option value="prev">この版での変更 (前バージョン比)</option>
            <option value="current">この版からの変更 (現在の下書き比)</option>
          </select>
          <div class="banner-btn-group">
            <button id="btn-view-raw" class="diff-sub-btn">原文</button>
            <button id="btn-view-diff" class="diff-sub-btn active">差分</button>
          </div>
          <div class="banner-btn-group">
            <button id="btn-diff-split" class="diff-sub-btn active">Split</button>
            <button id="btn-diff-unified" class="diff-sub-btn">Unified</button>
          </div>
        </div>

        <textarea id="essay-textarea" class="essay-textarea"
          placeholder="ここにエッセイを入力してください。&#10;&#10;①〜④ の合計が 1,200字以内です。" spellcheck="false"
          aria-label="エッセイ本文"></textarea>
        <div id="essay-diff" class="essay-diff" style="display: none;"></div>
      </div>
    </section>

    <div class="panel-divider" aria-hidden="true" data-divider="0"></div>

    <!-- ── 中央パネル: チェックリスト ────────────────────────── -->
    <section class="panel panel-checklist" aria-label="審査チェックリスト">
      <div class="panel-header">
        <h2 class="panel-title">審査チェックリスト</h2>
        <div class="panel-meta" id="checklist-mode-hint">
          <span class="hint-text">生徒モードでは閲覧のみ</span>
        </div>
      </div>
      <div class="panel-body panel-body--scroll">

        <div id="checklist-container" class="checklist-container"></div>
      </div>
    </section>

    <div class="panel-divider" aria-hidden="true" data-divider="1"></div>

    <!-- ── 右パネル: コメント ─────────────────────────────────── -->
    <section class="panel panel-comments" aria-label="先生のコメント">
      <div class="panel-header">
        <h2 class="panel-title">コメント</h2>
        <div class="panel-meta">
          <span class="hint-text">Markdown 対応</span>
        </div>
      </div>
      <div class="panel-body panel-body--scroll">
        <div id="comments-container" class="comments-container"></div>
      </div>
    </section>

  </main>

  <!-- ================================================================
       ボトムツールバー
  ================================================================ -->
  <footer class="app-toolbar">
    <div class="toolbar-left">
      <!-- 生徒: レビュー依頼 -->
      <button id="btn-request-review" class="toolbar-btn toolbar-btn--primary">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13" />
          <polygon points="22 2 15 22 11 13 2 9 22 2" />
        </svg>
        レビュー依頼
      </button>

      <!-- 先生: レビュー提出 -->
      <button id="btn-submit-review" class="toolbar-btn toolbar-btn--primary" style="display:none">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <polyline points="20 6 9 17 4 12" />
        </svg>
        レビュー提出
      </button>
    </div>
  </footer>

  <!-- ================================================================
       スクリプト
  ================================================================ -->
  <script type="module" src="js/app.js"></script>
</body>

</html>
